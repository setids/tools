<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalkulator Bensin Motor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="min-h-screen flex items-center justify-center p-4">
    <div
      class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden fade-in border border-slate-100"
    >
      <div
        class="bg-gradient-to-br from-indigo-600 to-blue-700 p-8 text-white text-center"
      >
        <h1 class="text-2xl font-bold tracking-tight">Bensin Calc</h1>
        <p class="text-indigo-100 text-sm mt-1 opacity-90">
          Hitung estimasi pengisian BBM Anda
        </p>
      </div>

      <div class="p-6 space-y-6">
        <div>
          <label
            class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2"
            >Pilih Jenis Motor</label
          >
          <select
            id="motorSelect"
            class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none transition"
          ></select>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label
              class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2"
              >Harga per Liter</label
            >
            <div class="relative">
              <span class="absolute left-3 top-3 text-slate-400 text-sm"
                >Rp</span
              >
              <input
                type="text"
                id="priceInput"
                inputmode="numeric"
                pattern="[0-9]*"
                placeholder="12.300"
                class="w-full p-3 pl-10 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none transition"
              />
            </div>
          </div>
          <div>
            <label
              class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2"
              >Sisa Bar</label
            >
            <input
              type="number"
              id="barInput"
              placeholder="1"
              min="0"
              class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none transition"
            />
          </div>
        </div>

        <button
          id="calculateBtn"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-100 transition-all active:scale-95"
        >
          Hitung Biaya
        </button>

        <div
          id="resultBox"
          class="hidden mt-4 p-5 bg-indigo-50 rounded-2xl border border-indigo-100 fade-in"
        >
          <div
            class="flex justify-between items-center mb-4 border-b border-indigo-100 pb-2"
          >
            <span
              class="text-indigo-800 font-semibold"
              id="motorNameDisplay"
            ></span>
            <span
              class="text-xs bg-indigo-200 text-indigo-700 px-2 py-1 rounded-full"
              id="capDisplay"
            ></span>
          </div>
          <div class="space-y-3">
            <div class="flex justify-between">
              <span class="text-slate-600 text-sm">Butuh bensin (est):</span>
              <span class="font-bold text-slate-800" id="litersNeeded"
                >0 L</span
              >
            </div>
            <div class="flex justify-between items-center">
              <span class="text-slate-600 text-sm">Total Biaya:</span>
              <span class="text-2xl font-black text-indigo-700" id="totalCost"
                >Rp 0</span
              >
            </div>
          </div>
        </div>
      </div>

      <!-- Panel Referensi Harga Pertamina -->
      <div class="mt-4 p-4 bg-blue-50 rounded-2xl border border-blue-100">
        <label
          class="block text-[10px] font-bold text-blue-400 uppercase tracking-wider mb-2 text-center"
          >Update Harga Resmi</label
        >
        <div class="flex justify-center">
          <a
            href="https://mypertamina.id/about/product-price"
            target="_blank"
            class="flex items-center gap-2 text-sm bg-white border border-blue-200 px-6 py-2 rounded-xl text-blue-600 hover:bg-blue-100 transition font-bold shadow-sm"
          >
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
              <path
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h-2v-6h2v6zm0-8h-2V7h2v2zm4 8h-2v-4h2v4zm0-6h-2V7h2v2z"
              />
            </svg>
            Cek Harga MyPertamina
          </a>
        </div>
      </div>

      <div class="p-6 bg-slate-50 text-center border-t border-slate-100">
        <p class="text-[10px] text-slate-400 leading-tight">
          Estimasi berdasarkan jumlah bar indikator digital. Hasil aktual dapat
          bervariasi.
        </p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
