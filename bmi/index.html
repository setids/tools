<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMI Calculator</title>
    <!-- Favicon Emoji -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">
    <div
      class="bg-white w-full max-w-md border-4 border-gray-900 shadow-[12px_12px_0px_0px_rgba(0,0,0,1)] p-6 md:p-8 animate__animated animate__fadeIn"
    >
      <div class="flex items-center gap-3 mb-8">
        <div
          class="bg-indigo-500 p-3 border-2 border-gray-900 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]"
        >
          <i class="fas fa-heartbeat text-white text-2xl"></i>
        </div>
        <h1
          class="text-3xl font-black text-gray-900 uppercase tracking-tighter"
        >
          BMI CALCULATOR
        </h1>
      </div>

      <div class="space-y-6">
        <!-- Pilihan Jenis Kelamin -->
        <div class="flex gap-4 mb-6">
          <button
            onclick="setGender('pria')"
            id="btnPria"
            class="flex-1 py-3 border-2 border-gray-900 font-black uppercase text-xs bg-indigo-500 text-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] transition-all"
          >
            <i class="fas fa-mars mr-2"></i> Pria
          </button>
          <button
            onclick="setGender('wanita')"
            id="btnWanita"
            class="flex-1 py-3 border-2 border-gray-900 font-black uppercase text-xs bg-white text-gray-900 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] transition-all"
          >
            <i class="fas fa-venus mr-2"></i> Wanita
          </button>
        </div>

        <!-- Input Berat -->
        <div>
          <label class="block text-xs font-black text-gray-500 uppercase mb-2"
            >Berat Badan (kg)</label
          >
          <div class="relative">
            <i
              class="fas fa-weight text-gray-400 absolute left-4 top-1/2 -translate-y-1/2"
            ></i>
            <input
              type="text"
              id="berat"
              oninput="formatInput(this)"
              class="w-full pl-12 pr-4 py-4 border-2 border-gray-900 focus:outline-none focus:bg-indigo-50 font-bold text-lg transition-all"
              placeholder="0"
            />
          </div>
        </div>

        <!-- Input Tinggi -->
        <div>
          <label class="block text-xs font-black text-gray-500 uppercase mb-2"
            >Tinggi Badan (cm)</label
          >
          <div class="relative">
            <i
              class="fas fa-ruler-vertical text-gray-400 absolute left-4 top-1/2 -translate-y-1/2"
            ></i>
            <input
              type="text"
              id="tinggi"
              oninput="formatInput(this)"
              class="w-full pl-12 pr-4 py-4 border-2 border-gray-900 focus:outline-none focus:bg-indigo-50 font-bold text-lg transition-all"
              placeholder="0"
            />
          </div>
        </div>

        <button
          onclick="hitungBMI()"
          class="w-full bg-yellow-400 hover:bg-yellow-300 text-gray-900 font-black py-4 border-2 border-gray-900 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-x-[2px] active:translate-y-[2px] transition-all uppercase tracking-widest text-sm"
        >
          Hitung Sekarang <i class="fas fa-arrow-right ml-2"></i>
        </button>
      </div>

      <!-- Area Hasil -->
      <div
        id="hasilArea"
        class="mt-10 hidden border-t-4 border-gray-900 pt-6 animate__animated animate__fadeIn"
      >
        <div class="relative mb-12 pt-4">
          <p class="text-xs font-bold text-gray-500 uppercase mb-2 text-center">
            Visualisasi Skor
          </p>
          <div
            class="relative w-full h-5 border-2 border-gray-900 flex rounded-full overflow-hidden shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]"
          >
            <div
              id="barKurus"
              class="bg-red-400 border-r border-gray-900 h-full"
            ></div>
            <div
              id="barIdeal"
              class="bg-green-400 border-r border-gray-900 h-full"
            ></div>
            <div
              id="barGemuk"
              class="bg-yellow-300 border-r border-gray-900 h-full"
            ></div>
            <div id="barObesitas" class="bg-red-600 h-full"></div>
          </div>

          <div
            id="bmiPointer"
            class="absolute top-11 left-0 -translate-x-1/2 flex flex-col items-center"
          >
            <i class="fas fa-caret-up text-3xl text-gray-900"></i>
            <div
              class="bg-gray-900 text-white text-[11px] font-black px-3 py-1 rounded-full shadow-[2px_2px_0px_0px_rgba(0,0,0,0.4)] -mt-1 whitespace-nowrap"
            >
              SKOR: <span id="skorPop">0</span>
            </div>
          </div>
        </div>

        <div class="text-center mt-12">
          <p class="text-xs font-black text-gray-500 uppercase">
            Kategori Anda
          </p>
          <div
            id="bmiStatusBox"
            class="inline-block px-6 py-2 border-2 border-gray-900 font-black uppercase text-sm shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] my-3"
          >
            -
          </div>
          <p
            id="bmiPesan"
            class="text-gray-700 font-medium text-sm leading-relaxed px-2"
          ></p>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
