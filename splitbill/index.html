<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SakuBagi - Split Bill Unik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body
    class="bg-[#F3F4F6] text-[#2D3436] font-sans min-h-screen flex items-center justify-center p-4"
  >
    <main
      class="w-full max-w-md bg-white border-4 border-[#2D3436] p-6 md:p-8 relative"
    >
      <!-- Aksen Dekoratif Unik -->
      <div
        class="absolute -top-4 -right-4 w-12 h-12 bg-[#FF7675] border-4 border-[#2D3436] hidden md:block"
      ></div>

      <header class="mb-8">
        <h1
          class="text-3xl font-black uppercase tracking-tighter border-b-4 border-[#6C5CE7] inline-block"
        >
          SakuBagi.
        </h1>
        <p class="text-sm mt-2 font-medium opacity-70">
          Bagi rata tanpa drama.
        </p>
      </header>

      <section class="space-y-6">
        <!-- Input Total -->
        <div>
          <label class="block text-xs font-bold uppercase mb-1"
            >Total Tagihan</label
          >
          <div class="relative">
            <span
              class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-xl"
              >Rp</span
            >
            <input
              type="number"
              id="totalBill"
              placeholder="0"
              class="w-full bg-[#E0E0E0] border-2 border-[#2D3436] p-4 pl-12 text-xl font-bold focus:bg-[#FFF] focus:outline-none transition-colors"
            />
          </div>
        </div>

        <!-- Input Jumlah Orang -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold uppercase mb-1"
              >Jumlah Orang</label
            >
            <input
              type="number"
              id="totalPeople"
              placeholder="1"
              class="w-full bg-[#E0E0E0] border-2 border-[#2D3436] p-4 text-xl font-bold focus:bg-[#FFF] focus:outline-none"
            />
          </div>
          <div>
            <label class="block text-xs font-bold uppercase mb-1"
              >Tip (%)</label
            >
            <input
              type="number"
              id="tipPercentage"
              placeholder="0"
              class="w-full bg-[#E0E0E0] border-2 border-[#2D3436] p-4 text-xl font-bold focus:bg-[#FFF] focus:outline-none"
            />
          </div>
        </div>

        <button
          onclick="calculateSplit()"
          class="w-full bg-[#00B894] border-4 border-[#2D3436] p-4 text-white font-black uppercase tracking-widest hover:bg-[#55E6C1] active:translate-y-1 transition-all"
        >
          Hitung Sekarang
        </button>
      </section>

      <!-- Hasil Output -->
      <section
        id="resultArea"
        class="mt-8 pt-8 border-t-4 border-dashed border-[#2D3436] hidden"
      >
        <div class="bg-[#FFEAA7] border-2 border-[#2D3436] p-4">
          <p class="text-xs font-bold uppercase mb-1">Per Orang Harus Bayar:</p>
          <div class="text-3xl font-black text-[#2D3436]" id="perPersonAmount">
            Rp 0
          </div>
        </div>
        <div class="mt-4 flex justify-between text-sm font-bold">
          <span>Total + Tip:</span>
          <span id="grandTotalText">Rp 0</span>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
